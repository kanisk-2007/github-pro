<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>ABC Training Institute</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Courses</a>
    <a href="#">Contact</a>
</nav>

<div class="card">

<h2>Student Registration Form</h2>

<form id="regForm">

<input type="text" id="name" placeholder="Full Name">

<input type="email" id="email" placeholder="Email">

<input type="text" id="mobile" placeholder="Mobile Number">

<label>Gender</label>

<input type="radio" name="gender" value="Male">Male

<input type="radio" name="gender" value="Female">Female

<br><br>

<input type="text" id="dept" placeholder="Department">

<select id="course">
<option value="">Select Course</option>
<option>Web Development</option>
<option>Python</option>
<option>Java</option>
<option>AI</option>
</select>

<br><br>

<label>Skills</label>

<input type="checkbox" value="HTML">HTML

<input type="checkbox" value="CSS">CSS

<input type="checkbox" value="JavaScript">JavaScript

<br><br>

<input type="date" id="dob">

<textarea id="address" placeholder="Address"></textarea>

<br><br>

<button type="submit">Submit</button>

<button type="reset">Reset</button>

</form>

</div>

<div class="card">

<h2>Registered Students</h2>

<table border="1">

<thead>

<tr>

<th>Name</th>

<th>Course</th>

<th>Department</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<footer>
© 2026 ABC Training Institute
</footer>

<script src="script.js"></script>

</body>
</html>
